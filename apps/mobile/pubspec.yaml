name: flujo_mobile
description: FLUJO Finance OS — Mobile App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # UI
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  lucide_icons: ^1.0.0
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0-pre

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  local_auth: ^2.2.0
  path_provider: ^2.1.4
  excel: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
